name: Run Tests (ruff, pylint, mypy, pytest)

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "20 10 * * SUN"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Depth of 2 suggested by codecov.io
          fetch-depth: 2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        # --no-build to avoid security alerts
        # --no-install-project so that we don't attempt to build the project, which would fail
        #   because of --no-build. And we don't need the project anyway cause we just need
        #   dev dependencies (tools) for linting.
        run: uv sync --frozen --no-build --no-install-project --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pylint
        run: uv run pylint src

      - name: MyPy
        run: uv run mypy src

      - name: Test with pytest, generating a coverage report and test analytics (for codecov.io)
        # coverage: pytest --cov --cov-branch --cov-report=xml
        # testa analytics: pytest --cov --junitxml=junit.xml -o junit_family=legacy
        run: uv run pytest --cov --cov-branch --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
